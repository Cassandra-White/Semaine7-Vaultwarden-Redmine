# Configuration Nginx pour Vaultwarden
# Fichier : /opt/vaultwarden/nginx/nginx.conf

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logs d'accès
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Taille maximale des uploads (pour les pièces jointes dans Vaultwarden)
    client_max_body_size 525m;

    # ─────────────────────────────────────────────────────────
    # Serveur HTTP (port 80) → redirection vers HTTPS
    # ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;   # Accepte toutes les requêtes

        # Redirige TOUT le trafic HTTP vers HTTPS
        return 301 https://$host$request_uri;
    }

    # ─────────────────────────────────────────────────────────
    # Serveur HTTPS (port 443) → Vaultwarden
    # ─────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # Certificat SSL
        ssl_certificate     /etc/nginx/ssl/vaultwarden.crt;
        ssl_certificate_key /etc/nginx/ssl/vaultwarden.key;

        # Paramètres SSL modernes (sécurisés)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # En-têtes de sécurité
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;

        # ── Proxy vers Vaultwarden (trafic web) ──────────────
        location / {
            proxy_pass http://vaultwarden:8080;  # Nom du service Docker

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout  90;
            proxy_send_timeout     90;
            proxy_read_timeout     90;

            # Taille des buffers
            proxy_buffer_size      128k;
            proxy_buffers          4 256k;
            proxy_busy_buffers_size 256k;
        }

        # ── Proxy pour les WebSockets (notifications) ─────────
        # Les WebSockets permettent à Bitwarden d'envoyer des
        # notifications en temps réel (ex: "un nouveau mot de passe a été ajouté")
        location /notifications/hub {
            proxy_pass http://vaultwarden:3012;

            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;

            proxy_http_version 1.1;
        }

        location /notifications/hub/negotiate {
            proxy_pass http://vaultwarden:8080;
        }
    }
}
